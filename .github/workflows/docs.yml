name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'Lingarr.Docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'Lingarr.Docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Setup Node.js
      uses: actions/setup-node@v7
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: Lingarr.Docs/package-lock.json

    - name: Install dependencies
      working-directory: ./Lingarr.Docs
      run: npm ci

    - name: Build
      working-directory: ./Lingarr.Docs
      run: npm run build

    - name: Upload Pages artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-pages-artifact@v5
      with:
        path: Lingarr.Docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v5
