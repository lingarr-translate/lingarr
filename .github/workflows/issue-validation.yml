name: Issue Template Validation

on:
  issues:
    types: [opened]

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const body = context.payload.issue.body || '';

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner,
              repo,
              per_page: 100,
            });
            const allowedVersions = new Set(tags.map(t => t.name.replace(/^v/, '').toLowerCase()));

            const hasConfirmation = body.includes('- [x] I confirm this issue was written by me and not generated by an LLM or AI assistant.');

            const versionMatch = body.match(/###\s*Lingarr version\s*\r?\n+([^\r\n]+)/i);
            const versionValue = versionMatch ? versionMatch[1].trim().replace(/^v/, '').toLowerCase() : '';
            const hasVersion = allowedVersions.has(versionValue);

            if (hasConfirmation && hasVersion) return;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: 'Closing this issue as it does not follow the bug report requirements. Please do not use the API, write up bug reports yourself using the template.',
            });

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['invalid'],
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number: issueNumber,
              state: 'closed',
              state_reason: 'not_planned',
            });
